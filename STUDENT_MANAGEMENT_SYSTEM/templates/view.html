<link rel="stylesheet" href="/static/style.css">

<div class="container">
    <h2>Student Records</h2>

    <table>
        <tr>
            <th>Roll</th>
            <th>Name</th>
            <th>Marks</th>
            <th>Attendance</th>
            <th>Grade</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        {% for s in students %}
        <tr>
            <td>{{ s[0] }}</td>
            <td>{{ s[1] }}</td>
            <td>{{ s[2] }}</td>
            <td>{{ s[3] }}</td>
            <td>{{ s[4] }}</td>
            <td>{{ s[5] }}</td>
            <td>
                <a href="/edit/{{ s[0] }}">Edit</a> |
                <a href="/delete/{{ s[0] }}">Delete</a> |
                <a href="/graph">View Graph</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/dashboard">⬅ Back</a>
</div>

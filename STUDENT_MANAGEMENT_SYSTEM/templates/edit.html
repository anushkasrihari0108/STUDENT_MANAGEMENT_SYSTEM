<link rel="stylesheet" href="/static/style.css">

<div class="container">
    <h2>Edit Student</h2>

    <form method="POST">
        <input name="name" value="{{ student[1] }}">
        <input name="marks" value="{{ student[2] }}">
        <input name="attendance" value="{{ student[3] }}">
        <button>Update</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <br>
    <a href="/view">⬅ Back</a>
</div>

<link rel="stylesheet" href="/static/style.css">

<div class="container">
    <h2>Add Student</h2>

    <p style="text-align:center;">Enter student details below</p>

    <form method="POST">
        <input name="roll" placeholder="Roll Number">
        <input name="name" placeholder="Name">
        <input name="marks" placeholder="Marks">
        <input name="attendance" placeholder="Attendance (%)">
        <button>Add Student</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <br>
    <a href="/dashboard">⬅ Back</a>
</div>
